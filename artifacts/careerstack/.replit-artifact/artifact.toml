kind = "web"
previewPath = "/"
title = "CareerStack AI"
version = "1.0.0"
id = "artifacts/careerstack"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20594

[services.development]
run = "pnpm --filter @workspace/careerstack run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/careerstack", "run", "build" ]
publicDir = "artifacts/careerstack/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20594"
BASE_PATH = "/"
